<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Проверка пар звук↔текст</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; max-width: 760px; margin: 0 auto; }
  h1 { font-size: 17px; margin: 0 0 4px; }
  .hint { color: #888; font-size: 13px; margin: 0 0 12px; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: 14px; margin: 8px 0; align-items: center; }
  .stats b { font-variant-numeric: tabular-nums; }
  .bar { height: 8px; background: #8883; border-radius: 4px; overflow: hidden; margin: 6px 0 14px; }
  .bar > i { display: block; height: 100%; background: #2e7d32; width: 0; }
  .card { border: 1px solid #8884; border-radius: 12px; padding: 20px; text-align: center; }
  .num { color: #888; font-size: 13px; }
  .oset { font-size: 26px; font-weight: 600; margin: 10px 0; line-height: 1.3; }
  .rus { font-size: 18px; color: #555; margin: 6px 0 4px; }
  .meta { color: #999; font-size: 12px; margin-top: 6px; }
  .btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  button { cursor: pointer; padding: 10px 18px; border-radius: 8px; border: 1px solid #8886; font-size: 15px; background: transparent; color: inherit; }
  button.ok { background: #2e7d32; color: #fff; border-color: #2e7d32; }
  button.no { background: #c62828; color: #fff; border-color: #c62828; }
  button.play { background: #1f4e78; color: #fff; border-color: #1f4e78; min-width: 130px; }
  .kbd { font-size: 12px; color: #999; margin-top: 10px; }
  .done { text-align: center; padding: 30px; }
  .row { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
</style>
</head>
<body>
<h1>Проверка пар: звук ↔ текст</h1>
<p class="hint">Слушаешь фрагмент, смотришь осетинский текст. Совпадает — «верно», нет — «неверно». В финал идут только верные.</p>

<div class="stats">
  <span>проверено <b id="s-done">0</b>/<b id="s-total">0</b></span>
  <span style="color:#2e7d32">верно <b id="s-ok">0</b></span>
  <span style="color:#c62828">неверно <b id="s-no">0</b></span>
  <span>точность <b id="s-acc">—</b></span>
  <span style="margin-left:auto"><button id="export">⬇ выгрузить верные</button>
  <button id="reset" title="сбросить прогресс">⟲</button></span>
</div>
<div class="bar"><i id="bar"></i></div>

<div id="stage"></div>

<audio id="au" preload="auto"></audio>
<script src="review_data.js"></script>
<script>
const RAW = u => u.replace("github.com/","raw.githubusercontent.com/").replace("/blob/","/");
const $ = id => document.getElementById(id);
const au = $('au');
let data = [], pos = 0, verdicts = {};

const KEY = 'nosu_review_v1';
function save(){ localStorage.setItem(KEY, JSON.stringify(verdicts)); }
function load(){ try { verdicts = JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e){ verdicts={}; } }

(function(){
  data = window.REVIEW_DATA || [];
  if (!data.length){ $('stage').innerHTML='<p class="done">Нет данных. Запусти <code>python3 gen_review.py</code> — он создаст review_data.js рядом.</p>'; return; }
  load();
  $('s-total').textContent = data.length;
  pos = data.findIndex(x=>!(x.path in verdicts));
  if (pos < 0) pos = data.length;
  render(); updateStats();
})();

function updateStats(){
  const v = Object.values(verdicts);
  const ok = v.filter(x=>x==='ok').length, no = v.filter(x=>x==='no').length;
  $('s-done').textContent = v.length;
  $('s-ok').textContent = ok; $('s-no').textContent = no;
  $('s-acc').textContent = (ok+no) ? Math.round(100*ok/(ok+no))+'%' : '—';
  $('bar').style.width = (100*v.length/data.length)+'%';
}

function render(){
  if (pos >= data.length){
    $('stage').innerHTML = '<div class="done"><h2>Готово 🎉</h2><p>Все пары пройдены. Жми «выгрузить верные» и пришли файл.</p></div>';
    return;
  }
  const it = data[pos];
  $('stage').innerHTML = `<div class="card">
    <div class="num">${pos+1} / ${data.length}${it.flag&&it.flag!=='-'?'  ·  ⚠ '+esc(it.flag):''}</div>
    <div class="oset">${esc(it.oset)}</div>
    <div class="rus">${esc(it.rus)}</div>
    <div class="meta">${esc(it.topic)} · ${it.dur.toFixed(1)}с</div>
    <div class="row"><button class="play" id="play">▶ слушать (Space)</button></div>
    <div class="btns">
      <button class="no" id="no">✗ неверно (←)</button>
      <button class="ok" id="ok">✓ верно (→)</button>
    </div>
    <div class="row"><button id="back" ${pos===0?'disabled':''}>← назад</button>
      <button id="skip">пропустить →</button></div>
    <div class="kbd">Space — слушать · → верно · ← неверно · Backspace — назад</div>
  </div>`;
  au.src = RAW(it.url);
  au.currentTime = 0; au.play().catch(()=>{});
  $('play').onclick = ()=>{ au.currentTime=0; au.play(); };
  $('ok').onclick = ()=>mark('ok');
  $('no').onclick = ()=>mark('no');
  $('skip').onclick = ()=>{ pos++; render(); };
  $('back').onclick = ()=>{ if(pos>0){ pos--; render(); } };
}
function mark(v){
  if (pos>=data.length) return;
  verdicts[data[pos].path] = v; save(); updateStats();
  pos++; render();
}
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

document.addEventListener('keydown', e=>{
  if (e.code==='Space'){ e.preventDefault(); au.currentTime=0; au.play(); }
  else if (e.key==='ArrowRight') mark('ok');
  else if (e.key==='ArrowLeft') mark('no');
  else if (e.key==='Backspace'){ e.preventDefault(); if(pos>0){ pos--; render(); } }
});

$('export').onclick = ()=>{
  const ok = data.filter(x=>verdicts[x.path]==='ok')
                 .map(x=>({path:x.path, oset:x.oset, rus:x.rus}));
  const blob = new Blob([JSON.stringify(ok,null,1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'confirmed.json'; a.click();
};
$('reset').onclick = ()=>{ if(confirm('Сбросить весь прогресс проверки?')){ verdicts={}; save(); pos=0; render(); updateStats(); } };
</script>
</body>
</html>
